<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Calculator - Be Fit</title>
    <style>
        /* Shared Be Fit Theme */
        :root {
            --primary-blue: #2563eb;
            --dark-blue: #1e3a8a;
            --light-blue: #eff6ff;
            --text-main: #1f2937;
            --bg-white: #ffffff;
            --border-color: #d1d5db;
            --cal-orange: #f59e0b; /* Special highlight for calories */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-blue);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background-color: var(--dark-blue);
            padding: 1rem;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .calculator-container {
            background-color: var(--bg-white);
            width: 90%;
            max-width: 500px;
            margin-top: 3rem;
            margin-bottom: 3rem;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--primary-blue);
        }

        .calculator-container h2 {
            text-align: center;
            color: var(--dark-blue);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus, 
        .input-group select:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--dark-blue);
        }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #fffbeb;
            border: 2px dashed var(--cal-orange);
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        #result-box h3 {
            color: var(--cal-orange);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        #result-box p {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-blue);
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Back to Home</a>
    </nav>

    <div class="calculator-container">
        <h2>Daily Calorie Needs</h2>
        <p class="subtitle">Calculate your Total Daily Energy Expenditure (TDEE).</p>

        <div class="input-group">
            <label for="age">Age</label>
            <input type="number" id="age" placeholder="e.g., 20" required>
        </div>

        <div class="input-group">
            <label for="sex">Biological Sex</label>
            <select id="sex">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="input-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" id="weight" placeholder="e.g., 70" required>
        </div>

        <div class="input-group">
            <label for="height">Height (cm)</label>
            <input type="number" id="height" placeholder="e.g., 175" required>
        </div>

        <div class="input-group">
            <label for="activity">Activity Level</label>
            <select id="activity">
                <option value="1.2">Sedentary (Little or no exercise)</option>
                <option value="1.375">Lightly Active (Exercise 1-3 days/week)</option>
                <option value="1.55">Moderately Active (Exercise 3-5 days/week)</option>
                <option value="1.725">Very Active (Hard exercise 6-7 days/week)</option>
                <option value="1.9">Extra Active (Very hard exercise/physical job)</option>
            </select>
        </div>

        <button onclick="calculateCalories()">Calculate Daily Calories</button>

        <div id="result-box">
            <h3 id="cal-value">0</h3>
            <p>kcal per day to maintain weight</p>
        </div>
    </div>

    <script>
        function calculateCalories() {
            // 1. Get values
            const age = parseFloat(document.getElementById('age').value);
            const sex = document.getElementById('sex').value;
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const activityMultiplier = parseFloat(document.getElementById('activity').value);

            // 2. Validate input
            if (isNaN(age) || isNaN(weight) || isNaN(height) || age <= 0 || weight <= 0 || height <= 0) {
                alert("Please enter valid positive numbers for Age, Weight, and Height.");
                return;
            }

            // 3. Math Logic (Mifflin-St Jeor Equation)
            let bmr = (10 * weight) + (6.25 * height) - (5 * age);
            
            if (sex === 'male') {
                bmr += 5;
            } else {
                bmr -= 161;
            }

            // Total Daily Energy Expenditure (TDEE)
            const tdee = Math.round(bmr * activityMultiplier);

            // 4. Update the UI
            document.getElementById('cal-value').innerText = tdee.toLocaleString();
            document.getElementById('result-box').style.display = "block";

            // 5. Save to LocalStorage for the Complete Report Page
            localStorage.setItem('health_calories', `${tdee} kcal/day`);
        }
    </script>

</body>
</html>
