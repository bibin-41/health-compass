<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Sugar Checker - Be Fit</title>
    <style>
        /* Shared Be Fit Theme */
        :root {
            --primary-blue: #2563eb;
            --dark-blue: #1e3a8a;
            --light-blue: #eff6ff;
            --text-main: #1f2937;
            --bg-white: #ffffff;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-blue);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background-color: var(--dark-blue);
            padding: 1rem;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .calculator-container {
            background-color: var(--bg-white);
            width: 90%;
            max-width: 500px;
            margin-top: 3rem;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--primary-blue);
        }

        .calculator-container h2 {
            text-align: center;
            color: var(--dark-blue);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        button {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--dark-blue);
        }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8fafc;
            border: 2px dashed var(--primary-blue);
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        #result-status {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 0.5rem;
        }

        .info-text {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #6b7280;
            font-style: italic;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Back to Home</a>
    </nav>

    <div class="calculator-container">
        <h2>Blood Sugar Checker</h2>
        <p class="subtitle">Check if your glucose levels are within range.</p>

        <div class="input-group">
            <label for="test-type">Test Type</label>
            <select id="test-type">
                <option value="fasting">Fasting (Before Meal)</option>
                <option value="post">Post-Prandial (2 hours after meal)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="sugar-value">Blood Sugar Level (mg/dL)</label>
            <input type="number" id="sugar-value" placeholder="e.g., 95" required>
        </div>

        <button onclick="checkSugar()">Check Status</button>

        <div id="result-box">
            <p>Your blood sugar status is:</p>
            <div id="result-status">---</div>
        </div>

        <p class="info-text">*  Always consult a doctor for correct medical diagnosis.</p>
    </div>

    <script>
        function checkSugar() {
            const type = document.getElementById('test-type').value;
            const val = parseFloat(document.getElementById('sugar-value').value);

            if (isNaN(val) || val <= 0) {
                alert("Please enter a valid blood sugar value.");
                return;
            }

            let status = "";
            let color = "";

            if (type === 'fasting') {
                if (val < 100) {
                    status = "Normal";
                    color = "#22c55e"; // Green
                } else if (val <= 125) {
                    status = "Prediabetes";
                    color = "#f59e0b"; // Amber
                } else {
                    status = "Diabetic";
                    color = "#ef4444"; // Red
                }
            } else { // Post-Prandial
                if (val < 140) {
                    status = "Normal";
                    color = "#22c55e";
                } else if (val <= 199) {
                    status = "Prediabetes";
                    color = "#f59e0b";
                } else {
                    status = "Diabetic";
                    color = "#ef4444";
                }
            }

            const statusDisplay = document.getElementById('result-status');
            statusDisplay.innerText = status;
            statusDisplay.style.color = color;
            document.getElementById('result-box').style.display = "block";

            // Save to LocalStorage
            const typeLabel = type === 'fasting' ? 'Fasting' : 'After Meal';
            localStorage.setItem('health_sugar', `${val} mg/dL (${typeLabel}) - ${status}`);
        }
    </script>
</body>
</html>
