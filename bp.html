<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Pressure Checker - Be Fit</title>
    <style>
        /* Shared Be Fit Theme */
        :root {
            --primary-blue: #2563eb;
            --dark-blue: #1e3a8a;
            --light-blue: #eff6ff;
            --text-main: #1f2937;
            --bg-white: #ffffff;
            --border-color: #d1d5db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-blue);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background-color: var(--dark-blue);
            padding: 1rem;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #93c5fd;
        }

        .calculator-container {
            background-color: var(--bg-white);
            width: 90%;
            max-width: 500px;
            margin-top: 3rem;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--primary-blue);
        }

        .calculator-container h2 {
            text-align: center;
            color: var(--dark-blue);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--dark-blue);
        }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8fafc;
            border: 2px dashed var(--primary-blue);
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        #bp-reading {
            font-size: 1.25rem;
            color: var(--dark-blue);
            margin-bottom: 0.5rem;
        }

        #result-status {
            font-size: 1.5rem;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Back to Home</a>
    </nav>

    <div class="calculator-container">
        <h2>Blood Pressure Checker</h2>
        <p class="subtitle">Enter your systolic and diastolic readings.</p>

        <div class="input-group">
            <label for="sys">Systolic (Top Number)</label>
            <input type="number" id="sys" placeholder="e.g., 118" required>
        </div>

        <div class="input-group">
            <label for="dia">Diastolic (Bottom Number)</label>
            <input type="number" id="dia" placeholder="e.g., 78" required>
        </div>

        <button onclick="checkBP()">Check Status</button>

        <div id="result-box">
            <div id="bp-reading">0/0 mmHg</div>
            <div id="result-status">---</div>
        </div>
    </div>

    <script>
        function checkBP() {
            const sys = parseFloat(document.getElementById('sys').value);
            const dia = parseFloat(document.getElementById('dia').value);

            if (isNaN(sys) || isNaN(dia) || sys <= 0 || dia <= 0) {
                alert("Please enter valid positive numbers for both fields.");
                return;
            }

            let status = "";
            let color = "";

            // Logic based on AHA guidelines
            if (sys < 120 && dia < 80) {
                status = "Normal";
                color = "#22c55e"; // Green
            } else if (sys >= 120 && sys <= 129 && dia < 80) {
                status = "Elevated";
                color = "#eab308"; // Yellow
            } else if ((sys >= 130 && sys <= 139) || (dia >= 80 && dia <= 89)) {
                status = "High BP (Stage 1)";
                color = "#f97316"; // Orange
            } else if (sys >= 140 || dia >= 90) {
                status = "High BP (Stage 2)";
                color = "#ef4444"; // Red
            }

            // Hypertensive crisis check (extreme high)
            if (sys > 180 || dia > 120) {
                status = "Hypertensive Crisis (Seek Medical Care)";
                color = "#991b1b"; // Dark Red
            }

            // Update UI
            document.getElementById('bp-reading').innerText = `${sys}/${dia} mmHg`;
            const statusDisplay = document.getElementById('result-status');
            statusDisplay.innerText = status;
            statusDisplay.style.color = color;
            
            document.getElementById('result-box').style.display = "block";

            // Save to LocalStorage for the Final Report
            localStorage.setItem('health_bp', `${sys}/${dia} mmHg - ${status}`);
        }
    </script>
</body>
</html>
