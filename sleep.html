<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Calculator - Health Compass</title>
    <style>
        /* Shared Be Fit Theme */
        :root {
            --primary-blue: #2563eb;
            --dark-blue: #1e3a8a;
            --light-blue: #eff6ff;
            --text-main: #1f2937;
            --bg-white: #ffffff;
            --border-color: #d1d5db;
            --sleep-indigo: #4f46e5; /* Special highlight for sleep */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-blue);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        nav {
            width: 100%;
            background-color: var(--dark-blue);
            padding: 1rem;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #93c5fd;
        }

        .calculator-container {
            background-color: var(--bg-white);
            width: 90%;
            max-width: 500px;
            margin-top: 3rem;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-top: 5px solid var(--primary-blue);
        }

        .calculator-container h2 {
            text-align: center;
            color: var(--dark-blue);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--dark-blue);
        }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #e0e7ff;
            border: 2px dashed var(--sleep-indigo);
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        #sleep-target {
            font-size: 2.5rem;
            color: var(--sleep-indigo);
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        #result-desc {
            font-size: 1.1rem;
            color: var(--dark-blue);
            font-weight: 600;
        }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">← Back to Home</a>
    </nav>

    <div class="calculator-container">
        <h2>Sleep Needs Calculator</h2>
        <p class="subtitle">Calculate your optimal sleep hours for health and recovery.</p>

        <div class="input-group">
            <label for="age">Age (Years)</label>
            <input type="number" id="age" placeholder="e.g., 20" required>
        </div>

        <div class="input-group">
            <label for="activity">Daily Physical Activity</label>
            <select id="activity">
                <option value="low">Low (Sedentary lifestyle)</option>
                <option value="moderate">Moderate (Light exercise 3-4 times/week)</option>
                <option value="high">High (Intense training/Heavy physical labor)</option>
            </select>
        </div>

        <button onclick="calculateSleep()">Calculate Sleep Target</button>

        <div id="result-box">
            <div id="sleep-target">0 - 0</div>
            <div id="result-desc">hours per night</div>
        </div>
    </div>

    <script>
        function calculateSleep() {
            const age = parseFloat(document.getElementById('age').value);
            const activity = document.getElementById('activity').value;

            if (isNaN(age) || age <= 0) {
                alert("Please enter a valid age.");
                return;
            }

            let minSleep = 7;
            let maxSleep = 9;

            // Base guidelines
            if (age <= 5) {
                minSleep = 10;
                maxSleep = 13;
            } else if (age <= 12) {
                minSleep = 9;
                maxSleep = 12;
            } else if (age <= 18) {
                minSleep = 8;
                maxSleep = 10;
            } else if (age >= 65) {
                minSleep = 7;
                maxSleep = 8;
            }

            // Activity adjustments for adults and teens
            if (age >= 13) {
                if (activity === 'high') {
                    minSleep += 0.5; // Athletes need more recovery time
                    maxSleep += 1.0;
                }
            }

            // Update UI
            document.getElementById('sleep-target').innerText = `${minSleep} - ${maxSleep}`;
            document.getElementById('result-box').style.display = "block";
            
            // Save to LocalStorage
            localStorage.setItem('health_sleep', `${minSleep}-${maxSleep} hours`);
        }
    </script>
</body>
</html>
